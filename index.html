<!DOCTYPE html>
<html>
<head>
    <title>SHM Simulation</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h2>Simple Harmonic Motion Simulation</h2>

<canvas id="canvas" width="600" height="200"></canvas>

<br>

<label>Amplitude</label>
<input type="range" id="amp" min="20" max="100" value="80">

<label>Damping</label>
<input type="range" id="damp" min="0" max="0.01" step="0.0005" value="0">

<script src="script.js"></script>

</body>
</html>
