<!DOCTYPE html>
<html>
<head>
  <title>SSS SHM Simulator</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="top-panel">
  <div class="equation">
    x(t)=A e^{-γt} cos(ωt)
  </div>

  <div class="params">
    A, γ, ω, t displayed live
  </div>

  <div class="insight">
    Damped SHM with energy loss and phase space evolution
  </div>
</div>

<h2>SHM Physics Dashboard</h2>

<div class="grid">

  <canvas id="motion" width="400" height="200"></canvas>
  <canvas id="xt" width="400" height="200"></canvas>

  <canvas id="energy" width="400" height="200"></canvas>
  <canvas id="phase" width="400" height="200"></canvas>

</div>

<div class="controls">

  <label>A</label>
  <input type="range" id="A" min="20" max="120" value="80">

  <label>γ</label>
  <input type="range" id="b" min="0" max="0.02" step="0.0005" value="0">

  <label>ω</label>
  <input type="range" id="w" min="0.01" max="0.1" step="0.001" value="0.04">

  <button onclick="reset()">Reset</button>

</div>

<script src="script.js"></script>

</body>
</html>
