<!DOCTYPE html>
<html>
<head>
  <title>SSS SHM Simulator</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Simple Harmonic Motion – Physics Dashboard</h1>

<div class="grid">

  <canvas id="motion" width="400" height="200"></canvas>
  <canvas id="xt" width="400" height="200"></canvas>

  <canvas id="energy" width="400" height="200"></canvas>
  <canvas id="phase" width="400" height="200"></canvas>

</div>

<div class="controls">

  <label>Amplitude</label>
  <input type="range" id="A" min="20" max="120" value="80">

  <label>Damping</label>
  <input type="range" id="b" min="0" max="0.02" step="0.0005" value="0">

  <label>Frequency</label>
  <input type="range" id="w" min="0.01" max="0.1" step="0.001" value="0.04">

  <button onclick="reset()">Reset</button>

</div>

<script src="script.js"></script>

</body>
</html>
