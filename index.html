<!DOCTYPE html>
<html>
<head>
    <title>SHM Graph Simulator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>SHM Graph Simulator</h1>

<div class="wrapper">

    <canvas id="graph" width="700" height="400"></canvas>

    <div class="controls">

        <label>Amplitude (A)</label>
        <input type="range" id="A" min="20" max="150" value="100">

        <label>Damping (b)</label>
        <input type="range" id="b" min="0" max="0.02" step="0.0005" value="0">

        <label>Frequency (ω)</label>
        <input type="range" id="w" min="0.01" max="0.1" step="0.001" value="0.04">

        <button onclick="reset()">Reset</button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
