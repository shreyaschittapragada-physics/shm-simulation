<h1>Simple Harmonic Motion Simulator</h1>

<div class="container">

  <canvas id="motion" width="600" height="200"></canvas>

  <canvas id="energy" width="600" height="200"></canvas>

  <canvas id="phase" width="300" height="300"></canvas>

</div>

<div class="controls">
  <label>Amplitude</label>
  <input type="range" id="A" min="20" max="100" value="80">

  <label>Damping</label>
  <input type="range" id="b" min="0" max="0.01" step="0.0005" value="0">
</div>

<div class="theory">
  <h2>Theory</h2>
  <p>SHM is governed by restoring force proportional to displacement.</p>
</div>

<script src="script.js"></script>
